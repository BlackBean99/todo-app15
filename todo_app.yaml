apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app15
  labels:
    app: todo-app15
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app15
  template:
    metadata:
      labels:
        app: todo-app15
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: todo-app15
        image: 121531024010.dkr.ecr.ap-northeast-2.amazonaws.com/todo-app15:feb4559
        ports:
        - containerPort: 5000
