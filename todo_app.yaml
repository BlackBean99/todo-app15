apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app99
  labels:
    app: todo-app99
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app99
  template:
    metadata:
      labels:
        app: todo-app99
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: todo-app99
        image: Your_AWS_Account_ID.dkr.ecr.ap-northeast-2.amazonaws.com/todo-app99:latest
        ports:
        - containerPort: 5000